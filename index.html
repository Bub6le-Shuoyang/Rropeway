<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data:;" />
    <meta name="theme-color" content="#f8f7f4" />
    <title>Rropeway · 游戏对话脚本编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./block-actions.css" />
  </head>
  <body><div class="window-chrome"><div class="window-drag-region"><span class="window-brand">✦ Rropeway</span><nav class="window-app-menu" aria-label="应用菜单"><div class="window-menu"><button class="window-menu-button" id="projectMenuButton" type="button" aria-expanded="false">项目</button><div class="window-project-menu hidden" id="windowProjectMenu" hidden><div class="window-menu-label">项目操作</div><button id="newProjectBtn" type="button"><span>新建项目</span><kbd>Ctrl+N</kbd></button><button id="openProjectBtn" type="button"><span>打开项目</span><kbd>Ctrl+O</kbd></button><button id="saveProjectBtn" type="button"><span>保存项目</span><kbd>Ctrl+S</kbd></button><button id="undoProjectBtn" type="button" disabled><span>撤回上一步</span><kbd>Ctrl+Z</kbd></button><div class="window-menu-separator"></div><button id="renameProjectBtn" type="button"><span>重命名项目</span><kbd>F2</kbd></button></div></div><div class="window-menu settings-window-menu" id="settingsMenu"><button class="window-menu-button" id="windowSettingsButton" type="button" aria-expanded="false">设置</button><div class="window-project-menu window-settings-menu hidden" id="windowSettingsMenu" hidden><div class="window-menu-label">主题</div><button class="settings-menu-option" type="button" data-theme-option="light"><span>浅色模式</span><span class="settings-check">✓</span></button><button class="settings-menu-option" type="button" data-theme-option="dark"><span>夜间模式</span><span class="settings-check">✓</span></button><button class="settings-menu-option" type="button" data-theme-option="system"><span>跟随系统</span><span class="settings-check">✓</span></button><div class="window-menu-separator"></div><div class="window-menu-label">界面大小</div><button class="settings-menu-option" type="button" data-scale-option="90"><span>紧凑</span><span class="settings-check">✓</span></button><button class="settings-menu-option" type="button" data-scale-option="100"><span>标准</span><span class="settings-check">✓</span></button><button class="settings-menu-option" type="button" data-scale-option="110"><span>宽松</span><span class="settings-check">✓</span></button><div class="window-menu-separator"></div><div class="window-menu-label">编辑器</div><button class="settings-menu-option preferences-menu-entry" id="editorPreferencesBtn" type="button"><span>偏好设置</span><span class="settings-menu-arrow">›</span></button><button class="settings-menu-option preferences-menu-entry" id="resetWindowLayoutBtn" type="button"><span>恢复默认窗口布局</span><span class="settings-menu-arrow">↺</span></button></div></div><button class="window-menu-button" id="windowHelpButton" type="button">帮助</button></nav></div><div class="window-controls"><button id="windowMinimize" title="最小化">−</button><button id="windowMaximize" title="最大化">□</button><button id="windowClose" title="关闭">×</button></div></div><div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-resize-handle" id="sidebarResizeHandle" title="拖动调整左侧栏宽度"></div>
        <div class="brand"><span class="brand-mark">✦</span><span>Rropeway</span></div>
        <div class="workspace-switcher" id="workspaceSwitcher"><span class="workspace-dot"></span><span id="workspaceTitle">Rropeway</span><span class="chevron">⌄</span></div>
        <nav class="main-nav" aria-label="主导航">
          <button class="nav-item active" data-view="editor" title="剧本编辑器"><span>▤</span>剧本编辑器</button>
          <button class="nav-item" data-view="characters" title="角色与立绘"><span>♧</span>角色与立绘</button>
          <button class="nav-item" data-view="assets" title="素材库"><span>▧</span>素材库</button>
        </nav>
        <div class="sidebar-section-title"><span>项目大纲</span><button class="tiny-add" id="addChapter" title="新建章节">＋</button></div>
        <div class="chapter-list" id="chapterList"></div><div class="sidebar-bottom">
          <button class="sidebar-collapse-toggle" id="sidebarCollapseButton" type="button" title="收起左侧栏" aria-label="收起左侧栏">‹</button>
          <div class="sync-status"><span id="projectLocationStatus">本地新项目</span><span class="save-separator">·</span><span id="saveStatus">未保存</span><span class="sidebar-version" id="appVersion">v0.4.0</span></div>
        </div>
      </aside>

      <main class="main-content">
        <section class="project-home-view hidden" id="projectHomeView">
          <div class="project-home-card">
            <div class="project-home-mark">✦</div>
            <div class="eyebrow">LOCAL STORY WORKSPACE</div>
            <h1>创建你的第一个项目仓库</h1>
            <p>项目会在你选择的位置创建同名文件夹，剧本、角色、素材和备份都会集中保存在其中。</p>
            <form class="project-create-form" id="projectCreateForm">
              <label><span>仓库名称</span><input id="projectCreateName" type="text" maxlength="80" placeholder="例如：星海旅途" required /></label>
              <label><span>项目简介</span><textarea id="projectCreateDescription" rows="3" maxlength="300" placeholder="简单描述故事主题或协作约定（可选）"></textarea></label>
              <label><span>保存位置</span><div class="project-location-picker"><input id="projectCreateLocation" type="text" readonly placeholder="请选择本地文件夹" /><button class="file-button" id="chooseProjectLocationBtn" type="button">选择文件夹</button></div></label>
              <div class="project-home-actions"><button class="primary-button" type="submit">创建项目</button><button class="file-button" id="openProjectFromHomeBtn" type="button">打开已有项目</button></div>
            </form>
          </div>
        </section>
        <header class="topbar">
          <div class="breadcrumb"><span>剧本编辑器</span><span>/</span><strong id="breadcrumbSceneTitle" role="button" tabindex="0" title="点击重命名当前场景">第一章 · 未命名场景</strong></div>
          <div class="project-search" id="projectSearch"><span class="project-search-icon">⌕</span><input id="projectSearchInput" type="search" autocomplete="off" placeholder="搜索章节、场景、角色或对白" aria-label="搜索项目信息" /><div class="project-search-results hidden" id="projectSearchResults" hidden></div></div>
        </header>

        <div class="editor-layout">
          <section class="script-panel" id="editorView">
            <div class="section-title script-heading"><div><div class="eyebrow">SCRIPT EDITOR</div><h2 id="sceneTitle">未命名场景</h2><p class="muted" id="sceneSummary">空白场景</p></div><div class="heading-actions"><button class="primary-button" id="previewBtn">▶ 预览</button></div></div>
            <div class="scene-tabs"></div>
            <div class="script-canvas">
              <div class="canvas-toolbar"><span>对白流</span><div class="toolbar-spacer"></div><button class="toolbar-icon" title="撤销">↶</button><button class="toolbar-icon" title="重做">↷</button></div>
              <div class="timeline-line"></div>
              <div class="flow-add-actions" id="flowAddActions" aria-label="新增剧本内容">
                <div class="dialogue-character-picker" id="dialogueCharacterPicker">
                  <button class="dialogue-character-picker-button" id="dialogueCharacterPickerButton" type="button" aria-haspopup="listbox" aria-expanded="false" title="设置新增对白角色">
                    <span class="dialogue-character-picker-avatar" id="dialogueCharacterPickerAvatar" aria-hidden="true">—</span>
                    <span class="dialogue-character-picker-label" id="dialogueCharacterPickerLabel">不设置角色</span>
                    <svg class="dialogue-character-picker-chevron" viewBox="0 0 16 16" aria-hidden="true"><path d="m4.5 6 3.5 3.5L11.5 6"/></svg>
                  </button>
                  <div class="dialogue-character-menu hidden" id="dialogueCharacterMenu" role="listbox" hidden></div>
                </div>
                <button class="flow-add-action" id="addDialogue" type="button" title="添加对话" aria-label="添加对话"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6.5h14v9H9l-4 3v-12Z"/><path d="M8.5 10h7M8.5 13h4.5"/></svg><small>对话</small></button>
                <button class="flow-add-action" id="addChoice" type="button" title="添加玩家选择" aria-label="添加玩家选择"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 6h11M7 12h7M7 18h9"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/><path d="m16 10 3 2-3 2"/></svg><small>选择</small></button>
                <button class="flow-add-action" id="addNarration" type="button" title="添加旁白" aria-label="添加旁白"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10M7 11h10M7 15h6"/><path d="M5 4.5h14v15H5z"/></svg><small>旁白</small></button>
                <button class="flow-add-action" id="addSegment" type="button" title="添加分段" aria-label="添加分段"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h16"/><circle cx="12" cy="12" r="2.5"/></svg><small>分段</small></button>
              </div>
            </div>
          </section>

          <nav class="segment-navigator hidden" id="segmentNavigator" aria-label="分段导航"></nav>
          <button class="back-to-top hidden" id="backToTop" type="button" title="回到顶部">↑<span>顶部</span></button>

          <aside class="inspector" id="inspector">
            <div class="inspector-resize-handle" id="inspectorResizeHandle" title="拖动调整右侧栏宽度"></div>
            <div class="inspector-header"><span>对白属性</span><div class="inspector-layout-actions"><button id="inspectorCollapseButton" type="button" title="收起右侧栏" aria-label="收起右侧栏">»</button></div></div>
            <div class="inspector-body"></div></aside>
        </div>
        <div class="floating-inspector-layer" id="floatingInspectorLayer"></div>

        <section class="alternate-view hidden" id="charactersView"></section>
        <section class="alternate-view hidden" id="relationshipsView"></section>
        <section class="alternate-view hidden" id="assetsView"><div class="section-title"><div><div class="eyebrow">LOCAL ASSET LIBRARY</div><h2>素材库</h2><p class="muted">所有素材只保存在当前电脑。</p></div><button class="primary-button" id="importAssetsBtn">＋ 导入素材</button></div><div class="asset-grid"></div></section>
      </main>
    </div>
    <div class="toast" id="toast">操作已完成</div>
    <div class="modal hidden" id="previewModal">
      <div class="modal-backdrop"></div>
      <div class="preview-window">
        <div class="preview-topbar">
          <div class="preview-title-copy"><span>▶ 单场景预览</span><small id="previewSceneName">未命名场景</small></div>
          <div class="preview-topbar-actions"><span id="previewProgress">0 / 0</span><button id="closePreview" type="button">×</button></div>
        </div>
        <div class="preview-stage">
          <div class="preview-scene" id="previewScene" tabindex="0" aria-label="点击继续播放剧本">
            <div class="preview-scene-location" id="previewSceneLocation"></div>
            <div class="preview-character preview-character-left no-portrait" id="previewCharacterLeft"></div>
            <div class="preview-character preview-character-right no-portrait" id="previewCharacterRight"></div>
            <div class="preview-segment-card hidden" id="previewSegmentCard"><small>场景分段</small><h3 id="previewSegmentTitle"></h3><p id="previewSegmentPerspective"></p></div>
            <div class="preview-end-card hidden" id="previewEndCard"><small id="previewEndEyebrow">本场景结束</small><h3 id="previewEndTitle"></h3><p id="previewEndHint"></p></div>
            <div class="preview-dialogue" id="previewDialogue"><b id="previewSpeaker"></b><p id="previewText"></p><div class="preview-options"></div><span class="preview-advance-hint" id="previewAdvanceHint">点击继续</span></div>
          </div>
        </div>
      </div>
    </div>
    <script src="./asset-references.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
