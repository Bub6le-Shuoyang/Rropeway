<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data:;" />
    <meta name="theme-color" content="#f8f7f4" />
    <title>Rropeway · 游戏对话脚本编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./block-actions.css" />
  </head>
  <body><div class="window-chrome"><div class="window-drag-region"><span class="window-brand">✦ Rropeway</span></div><div class="window-controls"><button id="windowMinimize" title="最小化">−</button><button id="windowMaximize" title="最大化">□</button><button id="windowClose" title="关闭">×</button></div></div><div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><span class="brand-mark">✦</span><span>Rropeway</span></div>
        <div class="workspace-switcher" id="workspaceSwitcher"><span class="workspace-dot"></span><span id="workspaceTitle">Rropeway</span><span class="chevron">⌄</span></div>
        <nav class="main-nav" aria-label="主导航">
          <button class="nav-item active" data-view="editor"><span>▤</span>剧本编辑器</button>
          <button class="nav-item" data-view="characters"><span>♧</span>角色与立绘</button>
          <button class="nav-item" data-view="assets"><span>▧</span>素材库</button>
        </nav>
        <div class="sidebar-section-title">章节 <button class="tiny-add" id="addChapter" title="新建章节">＋</button></div>
        <div class="chapter-list" id="chapterList"></div><div class="sidebar-bottom">
          <div class="sync-status"><span class="sync-dot"></span><span id="saveStatus">未保存</span><span class="save-time" id="saveTime">—</span></div>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="breadcrumb"><span>剧本编辑器</span><span>/</span><strong>第一章 · 未命名场景</strong></div>
          <div class="top-actions"><button class="file-button" id="newProjectBtn">新建</button><button class="file-button" id="openProjectBtn">打开</button><button class="file-button save" id="saveProjectBtn">保存</button></div>
        </header>

        <div class="editor-layout">
          <section class="script-panel" id="editorView">
            <div class="script-heading"><div><div class="eyebrow">SCRIPT EDITOR</div><h1>未命名场景</h1><p class="muted">空白场景</p></div><div class="heading-actions"><button class="primary-button" id="previewBtn">▶ 预览</button></div></div>
            <div class="scene-tabs"></div>
            <div class="script-canvas">
              <div class="canvas-toolbar"><span>对白流</span><div class="toolbar-spacer"></div><select class="toolbar-select" id="dialogueCharacterSelect" aria-label="新增对白角色" disabled><option value="">选择角色后添加对白</option></select><button class="toolbar-icon" title="撤销">↶</button><button class="toolbar-icon" title="重做">↷</button></div>
              <div class="timeline-line"></div>
              <button class="add-block" id="addDialogue" disabled><span>＋</span> 添加对白</button>
              <button class="add-block add-segment" id="addSegment"><span>＋</span> 添加分段</button>
            </div>
          </section>

          <aside class="inspector" id="inspector">
            <div class="inspector-header"><span>对白属性</span></div>
            <div class="inspector-body"></div></aside>
        </div>

        <section class="alternate-view hidden" id="charactersView"></section>
        <section class="alternate-view hidden" id="assetsView"><div class="section-title"><div><div class="eyebrow">LOCAL ASSET LIBRARY</div><h2>素材库</h2><p class="muted">所有素材只保存在当前电脑。</p></div><button class="primary-button" id="importAssetsBtn">＋ 导入素材</button></div><div class="asset-grid"></div></section>
      </main>
    </div>
    <div class="toast" id="toast">操作已完成</div>
    <div class="modal hidden" id="previewModal"><div class="modal-backdrop"></div><div class="preview-window"><div class="preview-topbar"><span>▶ 剧本预览</span><button id="closePreview">×</button></div><div class="preview-stage"><div class="preview-scene"><div class="preview-character"></div><div class="preview-dialogue"><b id="previewSpeaker"></b><p id="previewText"></p><div class="preview-options"></div></div></div></div></div></div></div>
    <script src="./app.js"></script>
  </body>
</html>
